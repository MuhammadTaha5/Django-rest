<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/login.css">
    <title>Login</title>
</head>
<body>
    <main>
        <div class="titleImage"><img src="../assets/loginImage.avif" alt=""></div>
        <div class="loginSection">
            <h3 style="margin-bottom: 30px;">
                Welcome to User Management <br>
                Sign into your Account
            </h3>
            <form action="" id="loginForm" method="post">
                <div>
                    <div class="mb-3 email-section">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" placeholder="abc-user" name="username" required>
                    </div>
                    <div class="mb-3 password-section">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="***********" required name="password">
                    </div>
                    <input type="submit" class="btn btn-primary"
                        style="background-color: #800080 !important; width: 100%;" value="Login">
                </div>
            </form>
        </div>
    </main>

    <!-- Loader moved outside of main for full-screen coverage -->
    <div id="loader"
        class="d-none position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50 d-flex justify-content-center align-items-center"
        style="z-index: 9999;background-color: rgba(0,0,0,0.2) !important; ">
        <div class="spinner-border text-light" role="status"></div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
    integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
    crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
    integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
    crossorigin="anonymous"></script>
<script src="../js/auth/login.js"></script>

</html>
